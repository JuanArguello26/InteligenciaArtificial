<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réve do Parfum | Esencia Exclusiva</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Login Overlay -->
    <section id="login-section">
        <div class="login-box">
            <h2>Réve do Parfum</h2>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Acceso Exclusivo</p>
            <form onsubmit="login(event)">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ej: owner, admin o client" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••" required>
                </div>
                <p id="login-error" class="hidden" style="color: var(--accent-red); margin-bottom: 1rem;"></p>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
            </form>
            <p style="margin-top: 1rem; font-size: 0.8rem; color: #666;">
                Demo: owner/1234 | client/1234 | admin/1234
            </p>
        </div>
    </section>

    <!-- Main Navigation -->
    <header id="main-nav">
        <div class="container nav-content">
            <div class="logo">Réve do Parfum</div>
            <div id="nav-links" class="nav-links">
                <!-- Dynamic Content injected by JS -->
            </div>
        </div>
    </header>

    <!-- Client View -->
    <main id="client-view" class="hidden">
        <div class="hero">
            <div class="hero-content">
                <h1>Réve do Parfum</h1>
                <p>La poesía de tu presencia</p>
            </div>
        </div>

        <section class="container">
            <h2 style="margin-bottom: 2rem; text-align: center;">Colección Exclusiva</h2>
            <div id="product-grid">
                <!-- Products injected by JS -->
            </div>

            <h2 style="margin: 3rem 0 2rem; text-align: center; border-top: 1px solid #333; padding-top: 2rem;">Mis
                Pedidos</h2>
            <div id="client-orders" class="container" style="padding-bottom: 3rem;">
                <!-- Client Orders injected by JS -->
            </div>
        </section>
    </main>

    <!-- Admin View -->
    <main id="admin-view" class="container hidden" style="padding-top: 2rem;">
        <h2 style="margin-bottom: 2rem;">Panel de Control</h2>

        <div class="dashboard-grid">
            <!-- Stats Row -->
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Ventas Totales</h3>
                    <p class="stat-number">$1,250.00</p>
                </div>
                <div class="stat-card">
                    <h3>Pedidos Pendientes</h3>
                    <p class="stat-number">3</p>
                </div>
            </div>

            <!-- Inventory Panel -->
            <div id="admin-inventory" class="card" style="padding: 1.5rem;">
                <!-- Inventory Table injected by JS -->
            </div>

            <!-- Orders Panel -->
            <div id="admin-orders" class="card" style="padding: 1.5rem;">
                <!-- Orders Table injected by JS -->
            </div>
        </div>
    </main>

    <!-- Shopping Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-header">
            <h3>Tu Carrito</h3>
            <button onclick="toggleCart()" class="close-modal">&times;</button>
        </div>
        <div id="cart-items" class="cart-items">
            <!-- Cart items injected by JS -->
        </div>
        <div style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 1rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <span>Total:</span>
                <span id="cart-total" style="font-weight: bold; color: var(--primary-color);">$0.00</span>
            </div>
            <button onclick="checkout()" class="btn btn-primary" style="width: 100%;">Finalizar Compra</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
